<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mcmenumimic — {{ item.name }}</title>
</head>
<body>
    <p><a href="/category/drinks">&larr; Back to drinks</a></p>
    <h1>{{ item.name }}</h1>

    {% if added %}
        <p><strong>✓ Added to cart.</strong> <a href="/cart">View cart</a> or customize another below.</p>
    {% endif %}

    <form method="post" action="/customize/drink/{{ item.id }}">
        <h2>Size</h2>
        {% for size in drink_sizes %}
            <label>
                <input type="radio" name="size" value="{{ size.id }}" {% if size.id == "M" %}checked{% endif %}>
                {{ size.name }} (SR {{ size.price }})
            </label>
        {% endfor %}

        <h2>Quantity</h2>
        <label>
            <input type="number" name="quantity" value="1" min="1" max="20">
        </label>

        <p><button type="submit">Add to Order</button></p>
    </form>
</body>
</html>
