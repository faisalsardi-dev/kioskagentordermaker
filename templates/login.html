<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>nlpkiosk2026 — Log In</title>
</head>
<body>
    <p><a href="/">&larr; Back to kiosk</a></p>
    <h1>Log in</h1>

    <div class="panel">
        {% if verified %}
            <p class="error" style="color: green;">Email verified. You can log in now.</p>
        {% endif %}
        {% if error_message %}
            <p class="error">{{ error_message }}</p>
        {% endif %}
        <form method="post" action="/login">
            <p>
                <label>Email<br>
                    <input type="email" name="email" value="{{ email | default('') }}" autocomplete="off" required>
                </label>
            </p>
            <p>
                <label>Password<br>
                    <input type="password" name="password" required>
                </label>
            </p>
            <button type="submit">Log in</button>
        </form>
        <p>No account yet? <a href="/register">Register</a></p>
    </div>
</body>
</html>
