<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mcmenumimic — AI Order</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            line-height: 1.4;
        }
        .messages {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 1rem 0;
        }
        .msg {
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            max-width: 85%;
        }
        .msg.user {
            background: #e0e0e0;
            align-self: flex-end;
        }
        .msg.assistant {
            background: #fff7d0;
            align-self: flex-start;
        }
        .empty {
            color: #777;
            font-style: italic;
        }
        form.send {
            display: flex;
            gap: 0.5rem;
        }
        form.send input[type="text"] {
            flex: 1;
            padding: 0.5rem;
            font-size: 1rem;
        }
        form.send button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <p><a href="/">&larr; Back to kiosk</a></p>
    <h1>AI Order Builder</h1>

    <div class="messages">
        {% if not messages %}
            <p class="empty">Tell me what you'd like to order.</p>
        {% endif %}
        {% for m in messages %}
            <div class="msg {{ m.role }}">
                <strong>{{ "You" if m.role == "user" else "Kiosk" }}:</strong>
                {{ m.content }}
            </div>
        {% endfor %}
    </div>

    <form method="post" action="/orderai/message" class="send">
        <input type="text" name="message" placeholder="Type your message..." autofocus>
        <button type="submit">Send</button>
    </form>

    <form method="post" action="/orderai/reset" style="margin-top:1rem">
        <button type="submit">Start new conversation</button>
    </form>
</body>
</html>
