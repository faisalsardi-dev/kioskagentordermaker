<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mcmenumimic — {{ item.name }}</title>
</head>
<body>
    <p><a href="/category/mccafe">&larr; Back to McCafé</a></p>
    <h1>{{ item.name }}</h1>
    <p>SR {{ item.price }}</p>

    {% if added %}
        <p><strong>✓ Added to cart.</strong> <a href="/cart">View cart</a> or customize another below.</p>
    {% endif %}

    <form method="post" action="/customize/mccafe/{{ item.id }}">
        <h2>Quantity</h2>
        <label>
            <input type="number" name="quantity" value="1" min="1" max="20">
        </label>

        <p><button type="submit">Add to Order</button></p>
    </form>
</body>
</html>
