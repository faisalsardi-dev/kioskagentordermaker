<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>nlpkiosk2026 — Verify Email</title>
</head>
<body>
    <p><a href="/">&larr; Back to kiosk</a></p>
    <h1>Verify your email</h1>

    <div class="panel">
        <p>We sent a 6-digit code to your email. Enter it below.</p>
        {% if error_message %}
            <p class="error">{{ error_message }}</p>
        {% endif %}
        <form method="post" action="/verify">
            <input type="hidden" name="email" value="{{ email }}">
            <p>
                <label>Verification code<br>
                    <input type="text" name="code" maxlength="6" autocomplete="off" required>
                </label>
            </p>
            <button type="submit">Verify</button>
        </form>
    </div>
</body>
</html>
